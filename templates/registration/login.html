{% load static %}
<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — VidShare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="background:var(--yt-surface-2);min-height:100vh;display:flex;align-items:center;justify-content:center;">

<div class="auth-card">

  <!-- Logo -->
  <div class="auth-card__logo">
    <span style="background:var(--yt-red);color:#fff;padding:4px 10px;border-radius:6px;margin-right:6px;font-size:16px;">▶</span>
    VidShare
  </div>
  <div class="auth-card__subtitle">Войдите в аккаунт</div>

  <!-- Error messages -->
  {% if form.non_field_errors %}
  <div class="yt-alert error mb-3">
    <i class="bi bi-exclamation-triangle-fill"></i>
    <span>{{ form.non_field_errors|join:', ' }}</span>
  </div>
  {% endif %}

  <form method="post" novalidate>
    {% csrf_token %}

    <div class="mb-3">
      <label for="{{ form.username.id_for_label }}" class="form-label">Имя пользователя</label>
      <input type="text" name="username" id="{{ form.username.id_for_label }}"
             class="form-control {% if form.username.errors %}is-invalid{% endif %}"
             value="{{ form.username.value|default:'' }}"
             autocomplete="username" autofocus>
      {% if form.username.errors %}
        <div class="invalid-feedback">{{ form.username.errors|join:', ' }}</div>
      {% endif %}
    </div>

    <div class="mb-4">
      <label for="{{ form.password.id_for_label }}" class="form-label">Пароль</label>
      <div style="position:relative;">
        <input type="password" name="password" id="{{ form.password.id_for_label }}"
               class="form-control {% if form.password.errors %}is-invalid{% endif %}"
               autocomplete="current-password">
        <button type="button" onclick="togglePwd(this)"
                style="position:absolute;right:12px;top:50%;transform:translateY(-50%);border:none;background:transparent;color:var(--yt-text-2);cursor:pointer;font-size:16px;">
          <i class="bi bi-eye-slash"></i>
        </button>
      </div>
    </div>

    <input type="hidden" name="next" value="{{ next }}">

    <button type="submit" class="btn-yt-primary w-100 justify-content-center">
      Войти
    </button>
  </form>

  <div style="text-align:center;margin-top:20px;font-size:14px;color:var(--yt-text-2);">
    Нет аккаунта?
    <a href="{% url 'register' %}" style="color:var(--yt-link);font-weight:500;">Зарегистрироваться</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (function() {
    const saved = localStorage.getItem('yt-theme') || 'light';
    document.documentElement.setAttribute('data-bs-theme', saved);
  })();

  function togglePwd(btn) {
    const input = btn.parentElement.querySelector('input');
    const icon  = btn.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'bi bi-eye';
    } else {
      input.type = 'password';
      icon.className = 'bi bi-eye-slash';
    }
  }
</script>
</body>
</html>
