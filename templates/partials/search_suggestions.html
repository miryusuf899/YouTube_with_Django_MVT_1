{% for video in suggestions %}
<a href="{% url 'video_detail' video.pk %}"
   style="display:flex;align-items:center;gap:12px;padding:10px 16px;font-size:14px;color:var(--yt-text);text-decoration:none;transition:background .15s;"
   onmouseover="this.style.background='var(--yt-surface-2)'"
   onmouseout="this.style.background='transparent'">

  <!-- Thumbnail mini -->
  <div style="width:56px;height:36px;border-radius:4px;overflow:hidden;background:var(--yt-surface-3);flex-shrink:0;">
    {% if video.thumbnail %}
      <img src="{{ video.thumbnail.url }}" style="width:100%;height:100%;object-fit:cover;" alt="">
    {% else %}
      <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--yt-text-3);font-size:16px;">
        <i class="bi bi-play-fill"></i>
      </div>
    {% endif %}
  </div>

  <div style="flex:1;min-width:0;">
    <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;">
      {{ video.title }}
    </div>
    <div style="font-size:12px;color:var(--yt-text-2);">{{ video.author.username }}</div>
  </div>

  <i class="bi bi-arrow-up-left" style="color:var(--yt-text-3);font-size:12px;flex-shrink:0;"></i>
</a>
{% endfor %}
