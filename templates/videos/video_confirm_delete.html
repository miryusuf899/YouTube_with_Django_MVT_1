{% extends 'base.html' %}
{% block title %}Удалить видео{% endblock %}

{% block content %}
<div class="col-md-6 mx-auto text-center mt-5">
    <div class="card shadow-sm">
        <div class="card-body p-5">
            <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 48px;"></i>
            <h2 class="mt-3">Удалить видео?</h2>
            <p class="lead text-muted">Вы уверены, что хотите удалить <strong>"{{ video.title }}"</strong>?</p>
            <p class="text-muted small">Это действие нельзя отменить.</p>
            
            <form method="post" class="mt-4">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger px-4 me-2">Удалить</button>
                <a href="{% url 'video_detail' video.pk %}" class="btn btn-outline-secondary px-4">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
